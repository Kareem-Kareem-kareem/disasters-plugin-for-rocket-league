name: Build RLDisasters Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache BakkesMod SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: bakkesmod-sdk
          key: bakkesmod-sdk-v1-${{ runner.os }}

      - name: Download BakkesMod SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/bakkesmodorg/BakkesModSDK/archive/refs/heads/master.zip" -OutFile sdk.zip
          Expand-Archive sdk.zip -DestinationPath sdk-raw
          Move-Item sdk-raw/BakkesModSDK-master bakkesmod-sdk

      - name: Verify SDK layout
        shell: pwsh
        run: |
          if (-not (Test-Path "bakkesmod-sdk/include/bakkesmod/plugin/bakkesmodplugin.h")) {
            Write-Error "SDK headers missing"
            exit 1
          }
          Write-Host "SDK layout OK"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DBAKKESMOD_SDK="${{ github.workspace }}/bakkesmod-sdk" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Locate built DLL
        id: locate
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path build -Filter "RLDisasters.dll" -Recurse | Select-Object -First 1
          if (-not $dll) {
            Write-Error "RLDisasters.dll was not produced by the build"
            exit 1
          }
          Write-Host "Found: $($dll.FullName)"
          echo "dll_path=$($dll.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload artifact (dll + set file)
        uses: actions/upload-artifact@v4
        with:
          name: RLDisasters-release
          path: |
            ${{ steps.locate.outputs.dll_path }}
            RLDisasters.set

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.locate.outputs.dll_path }}
            RLDisasters.set
